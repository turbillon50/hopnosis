<!DOCTYPE html>

<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hypnos Prime - Immersive Player</title>

                        "primary-fixed-dim": "#e9c349",
                        "inverse-on-surface": "#313030",
                        "background": "#131313",

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .gilded-border {
            border: 1px solid transparent;
            background: linear-gradient(#131313, #131313) padding-box,
                        linear-gradient(to bottom, #8A6D3B, #f2ca50) border-box;
        }
        .logo-glow {
            filter: drop-shadow(0 0 30px rgba(242, 202, 80, 0.25));
        }
        .shimmer-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #f2ca50;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(242, 202, 80, 0.8);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center overflow-hidden">
<!-- Top Navigation Header -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-margin py-4 bg-background/80 backdrop-blur-xl">
<button class="text-primary hover:opacity-70 transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]">keyboard_arrow_down</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile tracking-[0.2em] text-primary uppercase">HYPNOS</h1>
<button class="text-primary hover:opacity-70 transition-all">
<span class="material-symbols-outlined text-[28px]">more_horiz</span>
</button>
</header>
<!-- Main Player Content -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-[430px] px-container-margin pt-24 pb-12">
<!-- Artwork Section -->
<div class="relative w-full aspect-square flex items-center justify-center mb-section-gap">
<!-- Pulsating Background Glows -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-[80px] scale-90"></div>
<!-- Main Logo Artwork -->
<div class="relative z-10 w-4/5 aspect-square rounded-full flex items-center justify-center">
<img alt="Hypnos Prime Cosmic Logo" class="w-full h-full object-contain logo-glow" src="https://lh3.googleusercontent.com/aida/ADBb0uic2nshxbVrqo63iy2f-O_YoZVPAoLIQneW_Wekp-4dO9PU5Vxvx2kJx1Y743QeWCqIpY31LDnXcRd1gXPV7rwun1iCIGObZwf0hykmaHorR6dvR8SsZHLDUW7KxVzi6jCWgr-J5CoKJYmyTd-3oymZJo7oTPjJtyQlEu9C5146t9x0hEi5SrTvtdF_LkwZq4vM0xo8K4QE7mTIK2LiyveEvIq4rCVI8uxKDTbuDapqbMGfZuJCpWzz9Bb-"/>
</div>
</div>
<!-- Meta Information -->
<div class="text-center mb-10 w-full">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2 leading-tight">
                Reprogramación Subconsciente Profunda
            </h2>
<p class="font-headline-sm-mobile text-headline-sm-mobile text-on-surface-variant italic opacity-80">
                Por Maestro Honorio Castillo
            </p>
</div>
<!-- Audio Controls Group -->
<div class="w-full space-y-8">
<!-- Progress Bar -->
<div class="space-y-3">
<div class="relative w-full h-[3px] bg-outline-variant/30 rounded-full">
<div class="absolute top-0 left-0 h-full w-[45%] bg-primary rounded-full"></div>
<input class="absolute inset-0 w-full h-full opacity-0 cursor-pointer shimmer-thumb" max="100" min="0" type="range" value="45"/>
</div>
<div class="flex justify-between w-full">
<span class="font-label-md text-label-md text-outline">09:12</span>
<span class="font-label-md text-label-md text-outline">22:45</span>
</div>
</div>
<!-- Transport Controls -->
<div class="flex items-center justify-around w-full">
<button class="text-primary-fixed-dim hover:text-primary transition-all p-2">
<span class="material-symbols-outlined text-[36px]">skip_previous</span>
</button>
<button class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center text-on-primary shadow-[0_0_20px_rgba(242,202,80,0.2)] hover:scale-95 transition-transform">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="text-primary-fixed-dim hover:text-primary transition-all p-2">
<span class="material-symbols-outlined text-[36px]">skip_next</span>
</button>
</div>
</div>
</main>
<!-- Bottom Categories Label -->
<footer class="w-full py-8 flex flex-col items-center">
<div class="flex items-center gap-2 opacity-60">
<span class="font-label-md text-label-md text-on-surface-variant">CUERPO</span>
<span class="text-primary text-[6px]">•</span>
<span class="font-label-md text-label-md text-on-surface-variant">MENTE</span>
<span class="text-primary text-[6px]">•</span>
<span class="font-label-md text-label-md text-on-surface-variant">EMOCIÓN</span>
<span class="text-primary text-[6px]">•</span>
<span class="font-label-md text-label-md text-on-surface-variant">ESPÍRITU</span>
</div>
<!-- Interactive Handle -->
<div class="mt-6 w-12 h-1 bg-outline-variant/30 rounded-full"></div>
</footer>
